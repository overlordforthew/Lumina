<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>LUMINA | Guided 90-Day Growth Journal</title>
  <meta name="description" content="Lumina is Nami Barden's guided 90-day growth journal with daily check-ins, reflections, weekly synthesis, and compassionate pacing.">
  <meta name="robots" content="index,follow">
  <meta name="theme-color" content="#f5f0e8">
  <link rel="canonical" href="https://lumina.namibarden.com/">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preload" href="/app.js" as="script">
  <meta property="og:type" content="website">
  <meta property="og:title" content="LUMINA | Guided 90-Day Growth Journal">
  <meta property="og:description" content="Daily guided check-ins, reflections, weekly synthesis, and gentle pacing for meaningful inner work.">
  <meta property="og:url" content="https://lumina.namibarden.com/">
  <meta property="og:site_name" content="LUMINA">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="LUMINA | Guided 90-Day Growth Journal">
  <meta name="twitter:description" content="Daily guided check-ins, reflections, weekly synthesis, and gentle pacing for meaningful inner work.">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LUMINA",
      "url": "https://lumina.namibarden.com/",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "description": "A guided 90-day growth journal with daily check-ins, reflections, weekly synthesis, and compassionate pacing."
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f0e8;
      color: #3a3028;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d4c5a0; border-radius: 2px; }
    .boot-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .boot-card {
      width: min(100%, 420px);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 20px 50px rgba(58, 48, 40, 0.08);
      padding: 32px 26px;
      text-align: center;
    }
    .boot-mark {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      margin: 0 auto 18px;
      background: radial-gradient(circle at 30% 30%, #f4d69e 0, #e4b25f 35%, #8f6ac2 100%);
      box-shadow: 0 10px 24px rgba(143, 106, 194, 0.22);
    }
    .boot-title {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(2rem, 6vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 0.35rem;
      margin-bottom: 0.35rem;
    }
    .boot-subtitle {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.24rem;
      text-transform: uppercase;
      color: #6b5e50;
      margin-bottom: 1rem;
    }
    .boot-copy {
      font-size: 0.98rem;
      line-height: 1.7;
      color: #5a4e40;
      margin-bottom: 1rem;
    }
    .boot-meta {
      font-size: 0.86rem;
      line-height: 1.6;
      color: #6b5e50;
    }
    .boot-noscript {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #eadfcf;
      font-size: 0.88rem;
      color: #6b5e50;
    }
  </style>
</head>
<body>
  <div id="root">
    <main class="boot-shell" aria-labelledby="lumina-boot-title">
      <section class="boot-card">
        <div class="boot-mark" aria-hidden="true"></div>
        <h1 id="lumina-boot-title" class="boot-title">LUMINA</h1>
        <p class="boot-subtitle">The Holistic Growth Journal</p>
        <p class="boot-copy">A guided 90-day practice with daily check-ins, reflections, weekly synthesis, and compassionate pacing.</p>
        <p class="boot-meta">Billing and access are managed through namibarden.com using the same email address you use inside Lumina.</p>
        <noscript>
          <p class="boot-noscript">Lumina needs JavaScript enabled to sign in, save reflections, and unlock your membership.</p>
        </noscript>
      </section>
    </main>
  </div>
  <script defer src="/app.js"></script>
</body>
</html>
