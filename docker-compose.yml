services:
  # ─── LUMINA's own PostgreSQL database ───
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command:
      - |
        trap 'kill $$PG_PID; wait $$PG_PID' TERM INT
        docker-entrypoint.sh postgres &
        PG_PID=$$!
        until pg_isready -U "$$POSTGRES_USER" 2>/dev/null; do sleep 1; done
        psql -U "$$POSTGRES_USER" -c "ALTER USER \"$$POSTGRES_USER\" WITH PASSWORD '$$POSTGRES_PASSWORD';" 2>/dev/null || true
        wait $$PG_PID
    environment:
      POSTGRES_DB: ${DB_NAME:-lumina}
      POSTGRES_USER: ${DB_USER:-lumina}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
    volumes:
      - lumina_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lumina}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── LUMINA Node.js app ───
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3456"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lumina.entrypoints=https"
      - "traefik.http.routers.lumina.rule=Host(`lumina.namibarden.com`)"
      - "traefik.http.routers.lumina.tls=true"
      - "traefik.http.routers.lumina.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lumina.middlewares=security-headers@file"
      - "traefik.http.services.lumina.loadbalancer.server.port=3456"
      - "traefik.docker.network=coolify"
    networks:
      - coolify
      - default
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lumina}
      DB_USER: ${DB_USER:-lumina}
      DB_PASS: ${DB_PASS:?DB_PASS must be set in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      NODE_ENV: production
      PORT: 3456
    depends_on:
      db:
        condition: service_healthy

volumes:
  lumina_pgdata:
    external: true
    name: okw0cwwgskcow8k8o08gsok0_lumina-pgdata

networks:
  coolify:
    external: true
