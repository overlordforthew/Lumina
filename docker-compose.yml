services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3456"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lumina.entrypoints=https"
      - "traefik.http.routers.lumina.rule=Host(`lumina.namibarden.com`)"
      - "traefik.http.routers.lumina.tls=true"
      - "traefik.http.routers.lumina.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lumina.middlewares=security-headers@file"
      - "traefik.http.services.lumina.loadbalancer.server.port=3456"
      - "traefik.docker.network=coolify"
    networks:
      - coolify
      - namibarden-internal
    environment:
      DB_HOST: ${DB_HOST:-namibarden-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-namibarden}
      DB_USER: ${DB_USER:-namibarden}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA:-lumina}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-random-string}
      NODE_ENV: production
      PORT: 3456
      APP_BASE_URL: ${APP_BASE_URL:-https://lumina.namibarden.com}
      NAMI_API_BASE: ${NAMI_API_BASE:-https://namibarden.com/api/internal/lumina}
      NAMI_LUMINA_BRIDGE_SECRET: ${NAMI_LUMINA_BRIDGE_SECRET}
      LUMINA_ENABLE_TEST_USER: ${LUMINA_ENABLE_TEST_USER:-0}

networks:
  coolify:
    external: true
  namibarden-internal:
    external: true
